name: CI

on:
  push:
    branches: [main]
  pull_request:

# Allow a newer commit to a PR to cancel the previous run for the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Unit tests + clippy. No X server needed; integration tests live in their
  # own job below so the heavier apt install only runs there.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Clippy (warnings)
        run: cargo clippy --all-targets --no-deps -- -W clippy::all

      # Build and run in separate steps so the test step's log is just test
      # output — no interleaved "Compiling X" lines.
      - name: Build unit tests
        # aterm is a binary-only crate (no [lib] target). `--bins` picks up
        # the #[cfg(test)] modules compiled into the bin's test build.
        run: cargo test --bins --no-run

      - name: Run unit tests
        run: cargo test --bins

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # End-to-end integration tests. Installs Xvfb + Mesa software Vulkan +
  # ImageMagick, mirrors scripts/Dockerfile.test, then runs the integration
  # suite. On failure, uploads target/test-artifacts/ (screenshots + per-test
  # aterm stderr logs) as a workflow artifact so the failure can be inspected
  # without re-running.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # Reuse the same package list scripts/e2e.sh uses for local Linux dev
      # so the three install paths (CI, Dockerfile.test, e2e.sh) don't drift.
      - name: Install X / Vulkan deps
        run: sudo scripts/e2e.sh setup

      # We deliberately don't call `scripts/e2e.sh start` here. That helper
      # also launches an aterm instance for interactive poking; the Rust
      # integration tests spawn their own per-test child processes, so the
      # only thing CI needs from the harness is Xvfb + openbox.
      - name: Start Xvfb + openbox
        run: |
          Xvfb :99 -screen 0 1280x800x24 -ac >/tmp/xvfb.log 2>&1 &
          sleep 1
          DISPLAY=:99 xdpyinfo >/dev/null
          DISPLAY=:99 openbox >/tmp/openbox.log 2>&1 &
          sleep 1

      # Build and run in separate steps so the test step's log shows only
      # test results — all the "Compiling wgpu / glyphon / ..." noise lives
      # in the build step and can be skipped past when investigating a test
      # failure.
      - name: Build integration tests
        run: cargo test --test integration --no-run

      - name: Run integration tests
        env:
          DISPLAY: ":99"
          ATERM_TEST_ARTIFACTS: ${{ github.workspace }}/target/test-artifacts
        run: cargo test --test integration

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: aterm-test-artifacts
          path: target/test-artifacts/
          if-no-files-found: ignore
          retention-days: 14
