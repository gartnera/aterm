name: Release

# Cuts a release whenever the version in Cargo.toml lands on main and no tag
# for it exists yet. Bump `version` in Cargo.toml, merge to main, and this
# workflow tags `v<version>`, builds a universal (arm64 + x86_64) signed and
# notarized macOS .app, wraps it in a DMG, and publishes a GitHub release.
#
# Can also be kicked manually from the Actions tab (workflow_dispatch).
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   APPLE_CERTIFICATE_BASE64    base64 of your "Developer ID Application" .p12
#                               (e.g. `base64 -i cert.p12 | pbcopy`)
#   APPLE_CERTIFICATE_PASSWORD  password used when exporting that .p12
#   APPLE_SIGNING_IDENTITY      e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID                    Apple ID email used for notarization
#   APPLE_APP_PASSWORD          app-specific password for that Apple ID
#                               (appleid.apple.com -> Sign-In and Security)
#   APPLE_TEAM_ID               10-character Apple Developer Team ID
#   KEYCHAIN_PASSWORD           any throwaway string; secures the temp keychain

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Read the version out of Cargo.toml. If v<version> isn't already tagged,
  # create and push the tag; downstream jobs only run when a new tag is cut.
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version from Cargo.toml
        id: version
        run: |
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          if [ -z "$version" ]; then
            echo "could not parse version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Cargo.toml version: $version"

      - name: Create tag if missing
        id: tag
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; nothing to release."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

  macos:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: macos-14
    env:
      VERSION: ${{ needs.tag.outputs.version }}
      TAG: ${{ needs.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install tooling
        run: |
          cargo install cargo-bundle --locked
          brew install create-dmg

      # Import the Developer ID Application cert into a temporary keychain so
      # codesign can find it, then make that keychain searchable for the run.
      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          cert_path="$RUNNER_TEMP/certificate.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$cert_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"

          security import "$cert_path" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$keychain_path" >/dev/null

          # Keep the login keychain in the search list so Apple roots resolve.
          security list-keychains -d user -s "$keychain_path" login.keychain-db

      - name: Build universal binary and bundle
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin

          # cargo-bundle builds the .app skeleton (Info.plist, layout) for one
          # arch; we then drop a lipo'd universal binary into it.
          cargo bundle --release --target aarch64-apple-darwin

          app="target/aarch64-apple-darwin/release/bundle/osx/aterm.app"
          lipo -create -output "$app/Contents/MacOS/aterm" \
            target/aarch64-apple-darwin/release/aterm \
            target/x86_64-apple-darwin/release/aterm
          lipo -info "$app/Contents/MacOS/aterm"
          echo "APP_PATH=$app" >> "$GITHUB_ENV"

      - name: Codesign app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime --timestamp \
            --entitlements scripts/macos/entitlements.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH"
          codesign --verify --strict --verbose=2 "$APP_PATH"

      - name: Create DMG
        run: |
          dmg="aterm-$VERSION.dmg"
          # create-dmg exits non-zero when it can't set a custom volume icon
          # (no AppleScript/Finder on headless runners); the DMG is still
          # produced, so guard on the file existing rather than the exit code.
          create-dmg \
            --volname "aterm $VERSION" \
            --window-size 540 360 \
            --icon-size 100 \
            --icon "aterm.app" 140 180 \
            --app-drop-link 400 180 \
            --no-internet-enable \
            "$dmg" \
            "$APP_PATH" || true
          if [ ! -f "$dmg" ]; then
            echo "create-dmg did not produce $dmg" >&2
            exit 1
          fi
          echo "DMG_PATH=$dmg" >> "$GITHUB_ENV"

      - name: Sign DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$DMG_PATH"

      # Submit for notarization but don't block on the result. Gatekeeper
      # verifies the ticket online on first launch, so we skip --wait (and
      # therefore stapling, which requires a completed notarization). Trade-off:
      # a notarization rejection won't fail this workflow, and the app needs a
      # network connection the first time it's opened.
      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --no-wait

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-dmg
          path: ${{ env.DMG_PATH }}
          if-no-files-found: error

  # Self-contained Linux binaries. winit/wgpu dlopen X11/Wayland/Vulkan at
  # runtime, so no -dev packages are needed to link here.
  linux:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.tag.outputs.version }}
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linker (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          tarball="aterm-$VERSION-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$tarball" aterm
          echo "TARBALL=$tarball" >> "$GITHUB_ENV"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v5
        with:
          name: linux-${{ matrix.target }}
          path: ${{ env.TARBALL }}
          if-no-files-found: error

  # Gather every platform's artifact and publish a single GitHub release.
  publish:
    needs: [tag, macos, linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: aterm ${{ needs.tag.outputs.version }}
          generate_release_notes: true
          files: dist/*
